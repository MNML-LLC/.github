name: Claude Code (Reusable)

# MNML-LLC 全リポ共通マスターワークフロー。
# 各リポの claude.yml から uses: MNML-LLC/.github/.github/workflows/claude-reusable.yml@main で呼ぶ。

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      GH_ADMIN_PAT:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # GH_ADMIN_PAT (workflow scope) を使うことで下流ワークフローが正常 trigger される
          github_token: ${{ secrets.GH_ADMIN_PAT || github.token }}
          claude_args: >-
            --allowed-tools
            "Bash(npm*),Bash(npx*),Bash(node*),Bash(yarn*),Bash(pnpm*),Bash(uv*),Bash(python*),Bash(python3*),Bash(pip*),Bash(ruff*),Bash(make*),Bash(git*)"

      - name: Auto-create PR (if claude branch exists)
        id: pr-create
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT || github.token }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          REPO: ${{ github.repository }}
        run: |
          # claude-code-action 終了後は git credential が revoke 済みのため gh API 経由でブランチを探す
          BRANCH=$(gh api "repos/${REPO}/branches" --paginate \
            --jq ".[] | select(.name | startswith(\"claude/issue-${ISSUE_NUM}-\")) | .name" \
            | head -1)

          if [ -z "$BRANCH" ]; then
            echo "No claude branch for issue #${ISSUE_NUM}, skipping PR creation"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Found branch: $BRANCH"

          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR already exists: #$EXISTING"
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_URL=$(gh pr create \
            --repo "$REPO" \
            --base main \
            --head "$BRANCH" \
            --title "$ISSUE_TITLE" \
            --body "Closes #${ISSUE_NUM}

Generated with [Claude Code](https://claude.ai/code)")
          PR_NUM=$(echo "$PR_URL" | rev | cut -d/ -f1 | rev)
          echo "Created PR #${PR_NUM} ($PR_URL)"
          echo "pr_number=${PR_NUM}" >> "$GITHUB_OUTPUT"

      - name: Auto-merge (if labeled, after CI)
        if: |
          github.event_name == 'issues' &&
          contains(github.event.issue.labels.*.name, 'auto-merge') &&
          steps.pr-create.outputs.pr_number != ''
        env:
          # GITHUB_TOKEN だと merge イベントが trigger されず close-issue-on-merge が動かないため
          # 必ず GH_ADMIN_PAT (workflow scope 付き) で merge する
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT || github.token }}
          PR_NUM: ${{ steps.pr-create.outputs.pr_number }}
        run: |
          echo "Waiting for CI checks to complete on PR #${PR_NUM}..."
          # PR 作成 → workflow trigger までのラグを吸収
          sleep 10

          # CIチェックが0件のリポでも正常動作させる (gh pr checks --watch はゼロ件で exit 1)
          CHECK_JSON=$(gh pr checks "$PR_NUM" --json name 2>/dev/null || echo '[]')
          CHECK_COUNT=$(echo "$CHECK_JSON" | jq 'length' 2>/dev/null || echo 0)
          CHECK_COUNT=${CHECK_COUNT:-0}

          if [ "$CHECK_COUNT" -eq 0 ]; then
            echo "No CI checks configured on this repo; proceeding with merge"
          else
            if ! gh pr checks "$PR_NUM" --watch --interval 10; then
              echo "CI failed; not merging PR #${PR_NUM}"
              exit 1
            fi
            echo "All checks passed."
          fi

          echo "Squash merging PR #${PR_NUM}"
          gh pr merge "$PR_NUM" --squash --delete-branch

  close-issue-on-merge:
    # PR が merge されたら、PR body の "Closes #N" またはブランチ名から Issue を探して閉じる。
    # GitHub Actions が作成した PR は "Closes #N" の auto-link が効かないため明示的にクローズする。
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Close linked issue
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
        run: |
          # PR body の "Closes #N" を優先、なければブランチ名 claude/issue-N-* から抽出
          ISSUE_NUM=$(printf '%s' "$PR_BODY" | grep -oP '(?i)(?<=closes #)\d+' | head -1)
          if [ -z "$ISSUE_NUM" ]; then
            ISSUE_NUM=$(printf '%s' "$HEAD_REF" | grep -oP '(?<=issue-)\d+')
          fi
          if [ -z "$ISSUE_NUM" ]; then
            echo "No linked issue found; skipping"
            exit 0
          fi
          echo "Closing issue #${ISSUE_NUM} (merged by PR #${PR_NUM})"
          gh issue close "$ISSUE_NUM" --repo "$REPO" \
            --comment "PR #${PR_NUM} がマージされたため自動クローズしました。"

  retry-merge:
    # PR コメントに /retry-merge を投稿すると、失敗した auto-merge を再実行する。
    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '/retry-merge') &&
      github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    steps:
      - name: Retry auto-merge
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT || github.token }}
          PR_NUM: ${{ github.event.issue.number }}
        run: |
          echo "Retrying auto-merge for PR #${PR_NUM}..."
          sleep 10

          CHECK_JSON=$(gh pr checks "$PR_NUM" --json name 2>/dev/null || echo '[]')
          CHECK_COUNT=$(echo "$CHECK_JSON" | jq 'length' 2>/dev/null || echo 0)
          CHECK_COUNT=${CHECK_COUNT:-0}

          if [ "$CHECK_COUNT" -eq 0 ]; then
            echo "No CI checks configured on this repo; proceeding with merge"
          else
            if ! gh pr checks "$PR_NUM" --watch --interval 10; then
              echo "CI failed; not merging PR #${PR_NUM}"
              exit 1
            fi
            echo "All checks passed."
          fi

          echo "Squash merging PR #${PR_NUM}"
          gh pr merge "$PR_NUM" --squash --delete-branch
