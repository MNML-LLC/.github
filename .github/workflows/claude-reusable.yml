name: Claude Code (Reusable)

# MNML-LLC 全リポ共通マスターワークフロー。
# 各リポの claude.yml から uses: MNML-LLC/.github/.github/workflows/claude-reusable.yml@main で呼ぶ。

on:
  workflow_call:
    inputs:
      extra_claude_args:
        description: 'Additional claude CLI args (e.g. extra allowed tools)'
        required: false
        default: ''
        type: string
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      GH_ADMIN_PAT:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # PRコメント経由の実行では claude-code-action が PR ブランチへ checkout する。
      # 注入で dirty になった状態で別ブランチへ checkout すると失敗するため、
      # 注入より先に PR ブランチへ切り替えておく（action 内の checkout は no-op になる）。
      - name: Checkout PR branch (PR comment runs)
        if: |
          (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) ||
          github.event_name == 'pull_request_review_comment'
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT || github.token }}
        run: |
          # pull_request_review_comment イベントでは head.ref が取得できる
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          # issue_comment イベントには pull_request ペイロードが無いため
          # gh api で PR の head.ref を解決する（issue.number == PR番号）
          if [[ -z "$PR_BRANCH" ]]; then
            PR_BRANCH=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}" --jq .head.ref 2>/dev/null || true)
          fi
          if [[ -n "$PR_BRANCH" ]]; then
            git fetch origin "$PR_BRANCH"
            git checkout "$PR_BRANCH"
          else
            echo "WARN: PR ブランチを特定できませんでした。checkout をスキップします"
          fi

      - name: Inject MNML company policy and dev rules into CLAUDE.md
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT || github.token }}
        run: |
          touch CLAUDE.md
          # 会社方針 (mnml-agents root CLAUDE.md)
          POLICY=$(gh api repos/MNML-LLC/mnml-agents/contents/CLAUDE.md \
            --jq '.content' 2>/dev/null | base64 -d 2>/dev/null) || true
          # 開発ルール (mnml-agents agents/CLAUDE.md)
          DEV_RULES=$(gh api repos/MNML-LLC/mnml-agents/contents/agents/CLAUDE.md \
            --jq '.content' 2>/dev/null | base64 -d 2>/dev/null) || true
          {
            printf '\n\n---\n# MNML 会社方針（自動注入）\n\n'
            printf '%s\n' "$POLICY"
            printf '\n---\n# MNML 開発ルール（自動注入）\n\n'
            printf '%s\n' "$DEV_RULES"
          } >> CLAUDE.md
          LINES=$(wc -l < CLAUDE.md)
          if [ "$LINES" -gt 5 ]; then
            echo "✓ Company policy and dev rules injected (${LINES} total lines in CLAUDE.md)"
          else
            echo "⚠ Injection may have failed; continuing"
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_ADMIN_PAT || github.token }}
          claude_args: "--model claude-fable-5 --allowed-tools 'Bash(npm*),Bash(npx*),Bash(node*),Bash(yarn*),Bash(pnpm*),Bash(uv*),Bash(python*),Bash(python3*),Bash(pip*),Bash(ruff*),Bash(make*),Bash(git*)' ${{ inputs.extra_claude_args }}"

      - name: Notify failure
        if: failure() && steps.claude.conclusion == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT || github.token }}
          ISSUE_NUM: ${{ github.event.issue.number || github.event.comment.issue.number }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$ISSUE_NUM" --repo "$REPO" \
            --body "❌ Claude の実行が失敗しました。[ログを確認してください](${RUN_URL})"

      - name: Auto-create PR (if claude branch exists)
        id: pr-create
        # Issue コンテキスト (Issue 新規作成 or 既存 Issue へのコメント) でのみ実行。
        # PR へのコメント (issue.pull_request が存在) は既存 PR ブランチへの push なので対象外。
        if: |
          github.event_name == 'issues' ||
          (github.event_name == 'issue_comment' && !github.event.issue.pull_request)
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT || github.token }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          REPO: ${{ github.repository }}
        run: |
          # 再委譲で同一 Issue のブランチが複数ある場合に備え、
          # タイムスタンプ suffix の辞書順で最新のブランチを選ぶ
          BRANCH=$(gh api "repos/${REPO}/branches" --paginate \
            --jq ".[] | select(.name | startswith(\"claude/issue-${ISSUE_NUM}-\")) | .name" \
            | sort -r | head -1)

          if [ -z "$BRANCH" ]; then
            echo "No claude branch for issue #${ISSUE_NUM}, skipping PR creation"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Found branch: $BRANCH"

          EXISTING=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open \
            --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR already exists: #$EXISTING"
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # main に対して差分のない残骸ブランチ (マージ済み等) では PR を作らない
          AHEAD=$(gh api "repos/${REPO}/compare/main...${BRANCH}" --jq '.ahead_by' 2>/dev/null || echo 0)
          if [ "${AHEAD:-0}" -eq 0 ]; then
            echo "Branch $BRANCH has no commits ahead of main; skipping PR creation"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_URL=$(gh pr create \
            --repo "$REPO" \
            --base main \
            --head "$BRANCH" \
            --title "$ISSUE_TITLE" \
            --body "Closes #${ISSUE_NUM}")
          PR_NUM=$(echo "$PR_URL" | rev | cut -d/ -f1 | rev)
          echo "Created PR #${PR_NUM} ($PR_URL)"
          echo "pr_number=${PR_NUM}" >> "$GITHUB_OUTPUT"

          # 作成した PR URL を Issue にコメントで通知
          gh issue comment "$ISSUE_NUM" --repo "$REPO" \
            --body "🔀 PR を自動作成しました: ${PR_URL}"

      - name: Auto-merge (if labeled, after CI)
        if: |
          (github.event_name == 'issues' ||
           (github.event_name == 'issue_comment' && !github.event.issue.pull_request)) &&
          contains(github.event.issue.labels.*.name, 'auto-merge') &&
          steps.pr-create.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT || github.token }}
          PR_NUM: ${{ steps.pr-create.outputs.pr_number }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          echo "Waiting for CI checks to complete on PR #${PR_NUM}..."
          sleep 10

          CHECK_JSON=$(gh pr checks "$PR_NUM" --json name 2>/dev/null || echo '[]')
          CHECK_COUNT=$(echo "$CHECK_JSON" | jq 'length' 2>/dev/null || echo 0)
          CHECK_COUNT=${CHECK_COUNT:-0}

          if [ "$CHECK_COUNT" -eq 0 ]; then
            echo "No CI checks configured on this repo; proceeding with merge"
          else
            if ! gh pr checks "$PR_NUM" --watch --interval 10; then
              echo "CI failed; not merging PR #${PR_NUM}"
              exit 1
            fi
            echo "All checks passed."
          fi

          echo "Squash merging PR #${PR_NUM}"
          gh pr merge "$PR_NUM" --squash --delete-branch

  close-issue-on-merge:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Close linked issue
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
        run: |
          ISSUE_NUM=$(printf '%s' "$PR_BODY" | grep -oP '(?i)(?<=closes #)\d+' | head -1)
          if [ -z "$ISSUE_NUM" ]; then
            ISSUE_NUM=$(printf '%s' "$HEAD_REF" | grep -oP '(?<=issue-)\d+')
          fi
          if [ -z "$ISSUE_NUM" ]; then
            echo "No linked issue found; skipping"
            exit 0
          fi
          echo "Closing issue #${ISSUE_NUM} (merged by PR #${PR_NUM})"
          gh issue close "$ISSUE_NUM" --repo "$REPO" \
            --comment "PR #${PR_NUM} がマージされたため自動クローズしました。"

  retry-merge:
    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '/retry-merge') &&
      github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    steps:
      - name: Retry auto-merge
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT || github.token }}
          PR_NUM: ${{ github.event.issue.number }}
        run: |
          echo "Retrying auto-merge for PR #${PR_NUM}..."
          sleep 10

          CHECK_JSON=$(gh pr checks "$PR_NUM" --json name 2>/dev/null || echo '[]')
          CHECK_COUNT=$(echo "$CHECK_JSON" | jq 'length' 2>/dev/null || echo 0)
          CHECK_COUNT=${CHECK_COUNT:-0}

          if [ "$CHECK_COUNT" -eq 0 ]; then
            echo "No CI checks configured on this repo; proceeding with merge"
          else
            if ! gh pr checks "$PR_NUM" --watch --interval 10; then
              echo "CI failed; not merging PR #${PR_NUM}"
              exit 1
            fi
            echo "All checks passed."
          fi

          echo "Squash merging PR #${PR_NUM}"
          gh pr merge "$PR_NUM" --squash --delete-branch
