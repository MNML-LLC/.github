name: Claude Code (Reusable)

# MNML-LLC 全リポ共通マスターワークフロー。
# 各リポの claude.yml から uses: MNML-LLC/.github/.github/workflows/claude-reusable.yml@main で呼ぶ。
#
# 変更点 (Issue #168 - 自己修正ループ):
#   - `claude` ジョブに CI 待機 + 自己修正ステップを追加
#   - Auto-merge ステップを「CI check, auto-correct, and merge」に統合
#   - issue_comment (修正依頼コメント) 後の CI チェックステップを追加
#   - timeout-minutes を 30 → 60 に延長

on:
  workflow_call:
    inputs:
      max_correction_attempts:
        description: "CI失敗時の自動修正最大試行回数"
        type: number
        default: 3
      human_reviewer:
        description: "最大試行後の通知先 GitHub ユーザー名"
        type: string
        default: "info-mnml"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      GH_ADMIN_PAT:
        required: false
      SLACK_BOT_TOKEN:
        required: false
      SLACK_CHANNEL:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # GH_ADMIN_PAT (workflow scope) を使うことで下流ワークフローが正常 trigger される
          github_token: ${{ secrets.GH_ADMIN_PAT || github.token }}
          claude_args: "--allowed-tools 'Bash(npm*),Bash(npx*),Bash(node*),Bash(yarn*),Bash(pnpm*),Bash(uv*),Bash(python*),Bash(python3*),Bash(pip*),Bash(ruff*),Bash(make*),Bash(git*)'"

      - name: Auto-create PR (if claude branch exists)
        id: pr-create
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT || github.token }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          REPO: ${{ github.repository }}
        run: |
          # claude-code-action 終了後は git credential が revoke 済みのため gh API 経由でブランチを探す
          BRANCH=$(gh api "repos/${REPO}/branches" --paginate \
            --jq ".[] | select(.name | startswith(\"claude/issue-${ISSUE_NUM}-\")) | .name" \
            | head -1)

          if [ -z "$BRANCH" ]; then
            echo "No claude branch for issue #${ISSUE_NUM}, skipping PR creation"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Found branch: $BRANCH"

          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR already exists: #$EXISTING"
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_URL=$(gh pr create \
            --repo "$REPO" \
            --base main \
            --head "$BRANCH" \
            --title "$ISSUE_TITLE" \
            --body "Closes #${ISSUE_NUM}")
          PR_NUM=$(echo "$PR_URL" | rev | cut -d/ -f1 | rev)
          echo "Created PR #${PR_NUM} ($PR_URL)"
          echo "pr_number=${PR_NUM}" >> "$GITHUB_OUTPUT"

      - name: CI check, auto-correct, and merge
        # PR 作成直後に CI を待機し、失敗なら @claude 修正コメントを投稿。
        # auto-merge ラベル付きなら CI 通過後にそのままマージ。
        if: |
          github.event_name == 'issues' &&
          steps.pr-create.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT || github.token }}
          PR_NUM: ${{ steps.pr-create.outputs.pr_number }}
          REPO: ${{ github.repository }}
          MAX_ATTEMPTS: ${{ inputs.max_correction_attempts || 3 }}
          AUTO_MERGE: ${{ contains(github.event.issue.labels.*.name, 'auto-merge') }}
          HUMAN_REVIEWER: ${{ inputs.human_reviewer || 'info-mnml' }}
        run: |
          echo "Waiting for CI to trigger on PR #${PR_NUM}..."
          sleep 15

          # CIチェックの有無を確認
          CHECK_COUNT=$(gh pr checks "$PR_NUM" --json name --jq 'length' 2>/dev/null || echo 0)
          CHECK_COUNT=${CHECK_COUNT:-0}

          if [ "$CHECK_COUNT" -eq 0 ]; then
            echo "No CI checks configured on this repo"
            if [ "$AUTO_MERGE" = "true" ]; then
              echo "Auto-merging (no CI)..."
              gh pr merge "$PR_NUM" --squash --delete-branch
            fi
            exit 0
          fi

          echo "Waiting for ${CHECK_COUNT} CI check(s) to complete..."
          if gh pr checks "$PR_NUM" --watch --interval 15 2>/dev/null; then
            echo "CI passed!"
            if [ "$AUTO_MERGE" = "true" ]; then
              echo "Auto-merging..."
              gh pr merge "$PR_NUM" --squash --delete-branch
            fi
            exit 0
          fi

          echo "CI failed. Checking auto-correction state..."

          # 既存の自動修正コメント数をカウント（<!-- claude-auto-correction --> マーカー）
          ATTEMPT_COUNT=$(gh api "repos/${REPO}/issues/${PR_NUM}/comments" \
            --paginate \
            --jq '[.[] | select(.body | test("<!-- claude-auto-correction -->"))] | length' \
            2>/dev/null || echo 0)
          ATTEMPT_COUNT=${ATTEMPT_COUNT:-0}

          echo "Previous correction attempts: ${ATTEMPT_COUNT}/${MAX_ATTEMPTS}"

          if [ "$ATTEMPT_COUNT" -ge "$MAX_ATTEMPTS" ]; then
            echo "Max correction attempts reached. Requesting human review."
            gh issue comment "$PR_NUM" --repo "$REPO" --body "⚠️ **自動修正の上限（${MAX_ATTEMPTS}回）に達しました**

CIテストが ${MAX_ATTEMPTS} 回の自動修正後も失敗しています。人間のレビューが必要です。

@${HUMAN_REVIEWER} このPRを確認して手動で修正またはクローズしてください。"
          else
            NEXT_ATTEMPT=$((ATTEMPT_COUNT + 1))

            # 失敗チェックの詳細を取得
            FAIL_DETAILS=$(gh pr checks "$PR_NUM" --json name,state,link \
              --jq '[.[] | select(.state == "FAILURE" or .state == "ERROR")] | map("- [\(.name)](\(.link // "N/A"))") | join("\n")' \
              2>/dev/null || echo "詳細はワークフローログを確認してください")

            echo "Posting correction comment (attempt ${NEXT_ATTEMPT}/${MAX_ATTEMPTS})..."
            gh issue comment "$PR_NUM" --repo "$REPO" --body "<!-- claude-auto-correction -->
@claude CIテストが失敗しました（自動修正 ${NEXT_ATTEMPT}/${MAX_ATTEMPTS} 回目）。

### 失敗したチェック
${FAIL_DETAILS}

コードを修正してコミット・プッシュしてください。"
          fi
          exit 1

      - name: CI check after correction (issue_comment)
        # @claude 修正コメントへの応答後に CI を待機し、次の修正コメントを投稿。
        # 無限ループ防止: <!-- claude-auto-correction --> マーカーのコメント数で上限管理。
        if: |
          github.event_name == 'issue_comment' &&
          contains(github.event.comment.body, '<!-- claude-auto-correction -->') &&
          github.event.issue.pull_request != null
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT || github.token }}
          PR_NUM: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          MAX_ATTEMPTS: ${{ inputs.max_correction_attempts || 3 }}
          HUMAN_REVIEWER: ${{ inputs.human_reviewer || 'info-mnml' }}
        run: |
          echo "Correction attempt detected. Waiting for new CI to trigger after Claude's fix..."
          # Claude がプッシュしてから CI が起動するまでのラグを吸収
          sleep 30

          # CIチェックの有無を確認
          CHECK_COUNT=$(gh pr checks "$PR_NUM" --json name --jq 'length' 2>/dev/null || echo 0)
          CHECK_COUNT=${CHECK_COUNT:-0}

          if [ "$CHECK_COUNT" -eq 0 ]; then
            echo "No CI checks configured; skipping"
            exit 0
          fi

          echo "Waiting for CI checks to complete..."
          if gh pr checks "$PR_NUM" --watch --interval 15 2>/dev/null; then
            echo "CI passed after correction! No further action needed."
            exit 0
          fi

          echo "CI still failing after correction. Checking attempt count..."

          # 既存の自動修正コメント数をカウント
          ATTEMPT_COUNT=$(gh api "repos/${REPO}/issues/${PR_NUM}/comments" \
            --paginate \
            --jq '[.[] | select(.body | test("<!-- claude-auto-correction -->"))] | length' \
            2>/dev/null || echo 0)
          ATTEMPT_COUNT=${ATTEMPT_COUNT:-0}

          echo "Correction attempts so far: ${ATTEMPT_COUNT}/${MAX_ATTEMPTS}"

          if [ "$ATTEMPT_COUNT" -ge "$MAX_ATTEMPTS" ]; then
            echo "Max correction attempts reached. Requesting human review."
            gh issue comment "$PR_NUM" --repo "$REPO" --body "⚠️ **自動修正の上限（${MAX_ATTEMPTS}回）に達しました**

CIテストが ${MAX_ATTEMPTS} 回の自動修正後も失敗しています。人間のレビューが必要です。

@${HUMAN_REVIEWER} このPRを確認して手動で修正またはクローズしてください。"
          else
            NEXT_ATTEMPT=$((ATTEMPT_COUNT + 1))

            FAIL_DETAILS=$(gh pr checks "$PR_NUM" --json name,state,link \
              --jq '[.[] | select(.state == "FAILURE" or .state == "ERROR")] | map("- [\(.name)](\(.link // "N/A"))") | join("\n")' \
              2>/dev/null || echo "詳細はワークフローログを確認してください")

            echo "Posting correction comment (attempt ${NEXT_ATTEMPT}/${MAX_ATTEMPTS})..."
            gh issue comment "$PR_NUM" --repo "$REPO" --body "<!-- claude-auto-correction -->
@claude CIテストが失敗しました（自動修正 ${NEXT_ATTEMPT}/${MAX_ATTEMPTS} 回目）。

### 失敗したチェック
${FAIL_DETAILS}

コードを修正してコミット・プッシュしてください。"
          fi
          exit 1

  close-issue-on-merge:
    # PR が merge されたら、PR body の "Closes #N" またはブランチ名から Issue を探して閉じる。
    # GitHub Actions が作成した PR は "Closes #N" の auto-link が効かないため明示的にクローズする。
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Close linked issue
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        run: |
          # PR body の "Closes #N" を優先、なければブランチ名 claude/issue-N-* から抽出
          ISSUE_NUM=$(printf '%s' "$PR_BODY" | grep -oP '(?i)(?<=closes #)\d+' | head -1)
          if [ -z "$ISSUE_NUM" ]; then
            ISSUE_NUM=$(printf '%s' "$HEAD_REF" | grep -oP '(?<=issue-)\d+')
          fi
          if [ -z "$ISSUE_NUM" ]; then
            echo "No linked issue found; skipping"
            exit 0
          fi
          echo "Closing issue #${ISSUE_NUM} (merged by PR #${PR_NUM})"
          gh issue close "$ISSUE_NUM" --repo "$REPO" \
            --comment "PR #${PR_NUM} がマージされたため自動クローズしました。"

          # mnml-agents Issue クローズを platform M層 へ Slack 通知
          if [[ "$REPO" == *"mnml-agents"* ]] && [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL" ]; then
            MSG="@platform: Issue #${ISSUE_NUM} がクローズされました (PR #${PR_NUM})。次のアクションを確認・実行してください。"
            curl -s -X POST \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"channel\":\"${SLACK_CHANNEL}\",\"text\":\"${MSG}\"}" \
              https://slack.com/api/chat.postMessage > /dev/null
            echo "Slack 通知送信済み (Issue #${ISSUE_NUM})"
          fi

  retry-merge:
    # PR コメントに /retry-merge を投稿すると、失敗した auto-merge を再実行する。
    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '/retry-merge') &&
      github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    steps:
      - name: Retry auto-merge
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT || github.token }}
          PR_NUM: ${{ github.event.issue.number }}
        run: |
          echo "Retrying auto-merge for PR #${PR_NUM}..."
          sleep 10

          CHECK_JSON=$(gh pr checks "$PR_NUM" --json name 2>/dev/null || echo '[]')
          CHECK_COUNT=$(echo "$CHECK_JSON" | jq 'length' 2>/dev/null || echo 0)
          CHECK_COUNT=${CHECK_COUNT:-0}

          if [ "$CHECK_COUNT" -eq 0 ]; then
            echo "No CI checks configured on this repo; proceeding with merge"
          else
            if ! gh pr checks "$PR_NUM" --watch --interval 10; then
              echo "CI failed; not merging PR #${PR_NUM}"
              exit 1
            fi
            echo "All checks passed."
          fi

          echo "Squash merging PR #${PR_NUM}"
          gh pr merge "$PR_NUM" --squash --delete-branch


